<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Lookup System</title>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .card { width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #444; color: #00eaff; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #00eaff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .result-box { margin-top: 20px; background: #1a1a1a; padding: 15px; border-radius: 10px; display: none; }
        .data-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="text-align:center; color:#00eaff;">PHONE LOOKUP 🛰️</h2>
    <input type="text" id="numInput" placeholder="Enter number...">
    <button onclick="searchNumber()">SEARCH NOW</button>
    <div id="resArea" class="result-box"></div>
</div>

<script>
    async function searchNumber() {
        const num = document.getElementById("numInput").value.trim();
        const area = document.getElementById("resArea");
        
        if(!num) return;

        area.style.display = "block";
        area.innerHTML = "🔍 Scanning database...";

        try {
            // Corsproxy ka use kiya gaya hai taaki connection error na aaye
            const proxy = "https://corsproxy.io/?";
            const url = `https://openosintx.vippanel.in/num.php?key=Enjoy&number=${num}`;
            
            const response = await fetch(proxy + encodeURIComponent(url));
            const data = await response.json();

            if(data.success && data.result) {
                const r = data.result;
                area.innerHTML = `
                    <div class="data-row"><span>Name:</span> <b>${r.name || 'N/A'}</b></div>
                    <div class="data-row"><span>Mobile:</span> <b>${r.mobile}</b></div>
                    <div class="data-row"><span>Address:</span> <small style="text-align:right;">${r.address || 'N/A'}</small></div>
                `;
            } else {
                area.innerHTML = "❌ No records found.";
            }
        } catch(err) {
            area.innerHTML = "⚠️ Error: Please host this file on a website (like Vercel/GitHub) to avoid browser security blocks.";
        }
    }
</script>

</body>
</html>
